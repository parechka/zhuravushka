'use strict';
// ============================================================
// A. CONSTANTS & CANVAS
// ============================================================
const W = 180, H = 320;

// Display canvas — sized to screen, we blit onto it
const display = document.getElementById('c');
const dCtx = display.getContext('2d');

// Offscreen game buffer — all game rendering goes here at native 180x320
const buf = document.createElement('canvas');
buf.width = W; buf.height = H;
const ctx = buf.getContext('2d');

function resize() {
  const dpr = window.devicePixelRatio || 1;
  // Bitmap: integer scale, capped at 3 (visually identical, saves GPU)
  const ps = Math.max(1, Math.min(3, Math.floor(Math.min(
    window.innerWidth * dpr / W,
    window.innerHeight * dpr / H
  ))));
  display.width = W * ps;
  display.height = H * ps;
  // CSS: fill viewport maintaining aspect ratio (image-rendering:pixelated keeps it crisp)
  if (window.innerWidth / window.innerHeight < W / H) {
    display.style.width = window.innerWidth + 'px';
    display.style.height = (window.innerWidth * H / W) + 'px';
  } else {
    display.style.height = window.innerHeight + 'px';
    display.style.width = (window.innerHeight * W / H) + 'px';
  }
  dCtx.imageSmoothingEnabled = false;
  dCtx.mozImageSmoothingEnabled = false;
  dCtx.webkitImageSmoothingEnabled = false;
}
resize();
window.addEventListener('resize', resize);
document.addEventListener('fullscreenchange', () => setTimeout(resize, 100));
document.addEventListener('webkitfullscreenchange', () => setTimeout(resize, 100));

// Logo
const logoImg = new Image();
logoImg.src = 'zerkalo.png';

// Audio
const audioMenu = new Audio('menu.mp3');
audioMenu.loop = true;
audioMenu.volume = 0.4;
const audioIntro = new Audio('intro.mp3');
audioIntro.volume = 0.5;
const audioMusic = new Audio('music.mp3');
audioMusic.loop = true;
audioMusic.volume = 0.3;
const audioGameover = new Audio('gameover.mp3');
audioGameover.volume = 0.5;
audioGameover.onended = () => { playVoice(); };
let muted = false;
let menuActivated = false;

// Voice lines (Azarenok shouts)
const VOICE_COUNT = 23;
const voiceLines = [];
for (let vi = 1; vi <= VOICE_COUNT; vi++) {
  const a = new Audio('voice/voice_' + String(vi).padStart(2, '0') + '.mp3');
  a.volume = 0.8;
  voiceLines.push(a);
}
let voicePlaying = false;
let voiceTimer = 0;
let lastVoiceIdx = -1;

function playVoice() {
  if (muted || voicePlaying) return;
  let idx;
  do { idx = Math.random() * VOICE_COUNT | 0; } while (idx === lastVoiceIdx && VOICE_COUNT > 1);
  lastVoiceIdx = idx;
  const v = voiceLines[idx];
  v.currentTime = 0;
  voicePlaying = true;
  v.onended = () => { voicePlaying = false; };
  v.play().catch(() => { voicePlaying = false; });
  // 7-10 second cooldown (420-600 frames at 60fps)
  voiceTimer = 60 * (7 + Math.random() * 3) | 0;
}

function stopVoice() {
  voiceLines.forEach(v => { v.pause(); v.currentTime = 0; });
  voicePlaying = false;
}

// SFX
// SFX via Web Audio API (non-blocking on iOS)
const sfxBuffers = {};
const sfxVol = {
  hit1:0.3, hit2:0.3, hit3:0.3, hit4:0.3,
  enter:0.45, escape:0.5, turbo:0.45,
  empty:0.35, bus:0.4, flow:0.2, warning:0.4
};
const sfxFiles = {
  hit1:'sfx/hit1.mp3', hit2:'sfx/hit2.mp3', hit3:'sfx/hit3.mp3', hit4:'sfx/hit4.mp3',
  enter:'sfx/enter.mp3', escape:'sfx/escape.mp3', turbo:'sfx/turbo.mp3',
  empty:'sfx/empty.mp3', bus:'sfx/bus.mp3', flow:'sfx/flow.mp3', warning:'sfx/warning.mp3'
};

function loadSfxBuffers() {
  if (!audioCtx) return;
  for (const [name, url] of Object.entries(sfxFiles)) {
    fetch(url).then(r => r.arrayBuffer())
      .then(buf => audioCtx.decodeAudioData(buf))
      .then(decoded => { sfxBuffers[name] = decoded; })
      .catch(() => {});
  }
}

let sfxHitThrottle = 0;
let prevPressureAboveHalf = true;
let prevPressureAboveZero = true;
let flowActive = false;
let flowSource = null;
let flowGain = null;

function playSfx(name) {
  if (muted || !sfxBuffers[name] || !audioCtx) return;
  const src = audioCtx.createBufferSource();
  src.buffer = sfxBuffers[name];
  const g = audioCtx.createGain();
  g.gain.value = sfxVol[name] || 0.3;
  src.connect(g); g.connect(audioCtx.destination);
  src.start(0);
}
function startFlow() {
  if (flowActive || !audioCtx) return;
  flowActive = true;
  if (!sfxBuffers.flow) return;
  flowSource = audioCtx.createBufferSource();
  flowSource.buffer = sfxBuffers.flow;
  flowSource.loop = true;
  flowGain = audioCtx.createGain();
  flowGain.gain.value = 0;
  flowSource.connect(flowGain); flowGain.connect(audioCtx.destination);
  flowSource.start(0);
}
function stopFlow() {
  if (!flowActive) return;
  flowActive = false;
  if (flowSource) { try { flowSource.stop(); } catch(e) {} flowSource = null; }
  flowGain = null;
}
function stopAllSfx() {
  stopFlow();
}

// AudioContext for mobile unlock
let audioCtx;
let audioUnlocked = false;

// Loading: only wait for font (mobile blocks audio preload without gesture)
let fontLoaded = false;
function initLoading() {
  document.fonts.load('8px "PS2P"').then(() => { fontLoaded = true; })
    .catch(() => { fontLoaded = true; });
}

// Unlock audio on user gesture: silent buffer through AudioContext
function unlockAllAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  // Play silent buffer — unlocks audio playback on iOS Safari
  const b = audioCtx.createBuffer(1, 1, 22050);
  const s = audioCtx.createBufferSource();
  s.buffer = b; s.connect(audioCtx.destination); s.start(0);
  // Preload music/voice (start downloading, don't play)
  [audioMenu, audioIntro, audioMusic, audioGameover, ...voiceLines]
    .forEach(a => a.load());
  // Fetch and decode SFX into Web Audio buffers
  loadSfxBuffers();
}

// Page Visibility API — pause audio when tab not active
let wasPlayingBeforeHide = {};
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    // Remember which audio was playing, then pause all
    wasPlayingBeforeHide = {};
    const tracked = { menu: audioMenu, intro: audioIntro, music: audioMusic, gameover: audioGameover };
    for (const [k, a] of Object.entries(tracked)) {
      if (!a.paused) { wasPlayingBeforeHide[k] = true; a.pause(); }
    }
    voiceLines.forEach((v, i) => {
      if (!v.paused) { wasPlayingBeforeHide['v' + i] = true; v.pause(); }
    });
    if (flowActive) { wasPlayingBeforeHide.flow = true; stopFlow(); }
  } else {
    // Resume only what was playing
    if (wasPlayingBeforeHide.menu) audioMenu.play().catch(() => {});
    if (wasPlayingBeforeHide.intro) audioIntro.play().catch(() => {});
    if (wasPlayingBeforeHide.music) audioMusic.play().catch(() => {});
    if (wasPlayingBeforeHide.gameover) audioGameover.play().catch(() => {});
    voiceLines.forEach((v, i) => {
      if (wasPlayingBeforeHide['v' + i]) v.play().catch(() => {});
    });
    if (wasPlayingBeforeHide.flow) startFlow();
    wasPlayingBeforeHide = {};
  }
});

const F = '"PS2P", monospace'; // font shorthand

// Pixel-perfect text: draw each char at integer grid positions
// PS2P at 8px = 8px per char, at 16px = 16px per char
function pxT(c, text, cx, y, size) {
  size = size || 8;
  c.textAlign = 'left';
  const x = Math.round(cx - text.length * size / 2);
  for (let i = 0; i < text.length; i++) {
    c.fillText(text[i], x + i * size, y);
  }
}

// ============================================================
// B. DRAWING UTILS
// ============================================================
function px(c, x, y, col) { c.fillStyle = col; c.fillRect(x, y, 1, 1); }
function rect(c, x, y, w, h, col) { c.fillStyle = col; c.fillRect(x, y, w, h); }
function fillEllipse(c, cx, cy, rx, ry, col) {
  c.fillStyle = col;
  for (let dy = -ry; dy <= ry; dy++)
    for (let dx = -rx; dx <= rx; dx++)
      if ((dx*dx)/(rx*rx)+(dy*dy)/(ry*ry)<=1)
        c.fillRect(Math.round(cx+dx),Math.round(cy+dy),1,1);
}
function roundRect(c, x, y, w, h, col, r) {
  r = r||2;
  rect(c,x+r,y,w-r*2,1,col); rect(c,x,y+1,w,h-2,col); rect(c,x+r,y+h-1,w-r*2,1,col);
  if(r>1){rect(c,x+1,y,w-2,1,col);rect(c,x+1,y+h-1,w-2,1,col);}
}
function withOutline(cv, fn) {
  const w=cv.width,h=cv.height,c=cv.getContext('2d');c.clearRect(0,0,w,h);
  const off=document.createElement('canvas');off.width=w;off.height=h;
  fn(off.getContext('2d'));
  const sil=document.createElement('canvas');sil.width=w;sil.height=h;
  const sc=sil.getContext('2d');sc.drawImage(off,0,0);
  sc.globalCompositeOperation='source-in';sc.fillStyle=P.outline;sc.fillRect(0,0,w,h);
  for(const[dx,dy]of[[-1,0],[1,0],[0,-1],[0,1]])c.drawImage(sil,dx,dy);
  c.drawImage(off,0,0);
}
function makeWhite(spr) {
  const c=document.createElement('canvas');c.width=spr.width;c.height=spr.height;
  const x=c.getContext('2d');x.drawImage(spr,0,0);
  x.globalCompositeOperation='source-in';x.fillStyle='#fff';x.fillRect(0,0,c.width,c.height);
  return c;
}

  px(c,cx+5,22,P.red);px(c,cx+6,22,P.red);px(c,cx+5,23,'#a11');

// Walk frame: 0=stand, 1=left forward, 2=right forward
function drawTB(c, cx, cfg, wf) {
  wf = wf || 0;
  const lOff = wf === 1 ? -2 : wf === 2 ? 1 : 0;
  const rOff = wf === 1 ? 1 : wf === 2 ? -2 : 0;
  const aL = wf === 1 ? -1 : wf === 2 ? 1 : 0;
  const aR = wf === 1 ? 1 : wf === 2 ? -1 : 0;
  fillEllipse(c,cx,45,9,2,'rgba(0,0,0,0.18)');
  // Shoes with walk offset
  roundRect(c,cx-7,43+lOff,6,4,cfg.sho,1);rect(c,cx-6,43+lOff,3,1,'#665544');
  roundRect(c,cx+1,44+rOff,6,3,cfg.sho,1);rect(c,cx+2,44+rOff,3,1,'#665544');
  // Pants with walk offset
  rect(c,cx-6,34,5,10+lOff,cfg.pnt);rect(c,cx-6,34,2,9+lOff,cfg.pnL||cfg.pnt);
  rect(c,cx+1,35,5,10+rOff,cfg.pnt);rect(c,cx+1,35,2,9+rOff,cfg.pnL||cfg.pnt);
  // Torso
  rect(c,cx-8,20,16,15,cfg.shr);rect(c,cx-10,19,20,3,cfg.shr);
  rect(c,cx-10,19,3,13,cfg.shL||cfg.shr);rect(c,cx+5,19,4,13,cfg.shD||cfg.shr);
  rect(c,cx-8,33,16,1,cfg.shD||cfg.shr);rect(c,cx-10,19,14,1,cfg.shL||cfg.shr);
  // Arms with swing
  rect(c,cx-12,21+aL,3,12,cfg.sk);rect(c,cx-12,21+aL,1,11,cfg.skL);
  rect(c,cx+9,21+aR,3,12,cfg.sk);rect(c,cx+11,21+aR,1,11,cfg.skS);
  rect(c,cx-12,33+aL,3,3,cfg.sk);rect(c,cx+9,33+aR,3,3,cfg.sk);
  // Neck
  rect(c,cx-2,17,5,3,cfg.sk);rect(c,cx,17,1,3,cfg.skS);
  // Hair
  const hL=cx-8,hW=16;
  if(cfg.hs!=='bald'&&cfg.hs!=='hat'){
    roundRect(c,hL-1,1,hW+2,5,cfg.hr,2);rect(c,hL+8,1,6,3,cfg.hrD);
    rect(c,hL-1,4,2,4,cfg.hrD);rect(c,hL+hW-1,4,2,4,cfg.hrD);
  }
  // Face
  roundRect(c,hL,4,hW,13,cfg.sk,2);
  rect(c,hL+1,6,2,6,cfg.skL);rect(c,hL+hW-3,6,2,6,cfg.skS);
  rect(c,hL+2,8,4,3,'#e0e0e0');rect(c,hL+4,8,2,3,'#443322');
  px(c,hL+4,9,'#222');px(c,hL+5,8,'#fff');
  rect(c,hL+9,8,4,3,'#e0e0e0');rect(c,hL+9,8,2,3,'#443322');
  px(c,hL+10,9,'#222');px(c,hL+11,8,'#fff');
  px(c,cx,12,cfg.skS);px(c,cx+1,12,cfg.skS);
  rect(c,cx-2,14,4,1,'#c77');rect(c,cx-1,15,2,1,cfg.skS);
  return{hL,hW,cx};
}

function getPos(e) {
  const r = display.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: (t.clientX - r.left) / r.width * W, y: (t.clientY - r.top) / r.height * H };
}
display.addEventListener('touchstart', e => { e.preventDefault(); const p = getPos(e); onDown(p); }, { passive: false });
display.addEventListener('touchmove', e => { e.preventDefault(); const p = getPos(e); onMove(p); }, { passive: false });
display.addEventListener('touchend', e => { e.preventDefault(); onUp(); }, { passive: false });
display.addEventListener('mousedown', e => { const p = getPos(e); onDown(p); });
display.addEventListener('mousemove', e => { if (G.touching) { const p = getPos(e); onMove(p); } });
display.addEventListener('mouseup', () => onUp());

function toggleMute() {
  muted = !muted;
  audioMenu.muted = muted;
  audioIntro.muted = muted;
  audioMusic.muted = muted;
  audioGameover.muted = muted;
  voiceLines.forEach(v => { v.muted = muted; });
  // SFX uses Web Audio — playSfx checks 'muted' flag directly
  if (flowGain) flowGain.gain.value = muted ? 0 : 0.1;
}
// Mute button area: top-right corner, 16x16
const MUTE_X = W - 18, MUTE_Y = 2, MUTE_S = 14;
function hitMute(p) { return p.x >= MUTE_X && p.x <= MUTE_X + MUTE_S && p.y >= MUTE_Y && p.y <= MUTE_Y + MUTE_S; }

function onDown(p) {
  // Loading screen: tap to unlock audio + proceed
  if (G.state === 'loading') {
    if (!fontLoaded) return; // wait for font
    unlockAllAudio();
    G.state = 'title';
    renderBG();
    return;
  }

  // Check mute button on all screens
  if (hitMute(p)) { toggleMute(); return; }

  if (G.state === 'title') {
    if (G.introScreen === 0) {
      if (!menuActivated) {
        menuActivated = true;
        audioMenu.currentTime = 0;
        audioMenu.play().catch(() => {});
        return;
      }
      // Second tap: proceed to story
      G.introScreen = 1;
      audioMenu.pause();
      audioIntro.currentTime = 0;
      audioIntro.play().catch(() => {});
      return;
    }
    if (G.introScreen === 1) { G.introScreen = 2; return; }
    audioIntro.pause();
    startGame();
    audioMusic.currentTime = 0;
    audioMusic.play().catch(() => {});
    return;
  }
  if (G.state === 'over') {
    if (Date.now() - G.overTime < 1500) return;
    // Donate link area (y=270..300)
    if (p.y >= 270 && p.y <= 300) {
      window.location.href = 'https://donorbox.org/donation_form';
      return;
    }
    audioGameover.pause();
    stopVoice();
    startGame();
    audioMusic.currentTime = 0;
    audioMusic.play().catch(() => {});
    return;
  }
  G.touching = true; G.touchX = p.x; G.touchY = p.y;
}
function onMove(p) { G.touchX = p.x; G.touchY = p.y; }
function onUp() { G.touching = false; }

// ============================================================
// H. PHYSICS UPDATE
// ============================================================
function lerpAngle(a, b, t) {
  let d = b - a;
  while (d > Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return a + d * t;
}

function updateStream() {
  if (!G.touching || G.pressure <= 0) {
    G.streamActive = false;
    stopFlow();
    if (!G.touching && G.pressure < G.maxPressure) {
      G.pressure = Math.min(G.maxPressure, G.pressure + 35 / 60);
      // Track thresholds recovering
      if (G.pressure >= G.maxPressure * 0.5) prevPressureAboveHalf = true;
      if (G.pressure > 0) prevPressureAboveZero = true;
    }
    return;
  }
  G.streamActive = true;
  // Flow sound — volume follows pressure
  startFlow();
  if (flowGain) flowGain.gain.value = muted ? 0 : Math.min(0.2, 0.05 + 0.15 * (G.pressure / G.maxPressure));
  const target = Math.atan2(G.touchX - NOZ_X, AZ_Y - G.touchY);
  const clamped = Math.max(-1.4, Math.min(1.4, target));
  G.aimAngle = lerpAngle(G.aimAngle, clamped, 0.15);

  const pct = G.pressure / G.maxPressure;
  const turboMul = G.turboActive ? 2.0 : 1.0;
  const range = 140 * (0.4 + 0.6 * pct) * turboMul;
  const halfAng = (0.12 + 0.08 * pct) * (G.turboActive ? 2.5 : 1.0);
  const baseForce = 2.8 * turboMul;

  G.pressure = Math.max(0, G.pressure - (G.turboActive ? 16 : 8) / 60);

  // Warning SFX — once per crossing below 50%
  if (prevPressureAboveHalf && G.pressure < G.maxPressure * 0.5) {
    prevPressureAboveHalf = false;
    playSfx('warning');
  }
  // Empty SFX — once when hitting 0
  if (prevPressureAboveZero && G.pressure <= 0) {
    prevPressureAboveZero = false;
    playSfx('empty');
    stopFlow();
  }

  if (sfxHitThrottle > 0) sfxHitThrottle--;

  for (const t of G.tourists) {
    if (t.state === 'enter' || t.state === 'escape') continue;
    if (t.selfieImmune) continue;
    const dx = t.x - NOZ_X, dy = AZ_Y - t.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > range || dist < 5) continue;
    const ang = Math.atan2(dx, dy);
    let diff = ang - G.aimAngle;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    if (Math.abs(diff) > halfAng) continue;

    const distF = 1.0 - dist / range * 0.65;
    const force = baseForce * (0.5 + 0.5 * pct) * distF * (1.0 - t.resist);
    const pdx = Math.sin(G.aimAngle), pdy = -Math.cos(G.aimAngle);
    t.vx += (pdx + (Math.random() - 0.5) * 0.2) * force / t.mass;
    t.vy += (pdy + (Math.random() - 0.5) * 0.2) * force / t.mass;
    t.muddy = Math.min(1, t.muddy + 0.02);
    if (t.muddy > 0.5) G.shakeTrauma += 0.01;

    if (t.state === 'walk') {
      t.state = 'hit'; t.flash = 3; t.hitTime = 0;
      G.shakeTrauma += 0.08;
      if (sfxHitThrottle <= 0) { playSfx('hit' + (1 + (Math.random()*4|0))); sfxHitThrottle = 8; }
      for (let i = 0; i < 8; i++) {
        const a = Math.random() * Math.PI * 2;
        spawnPart(t.x + Math.cos(a) * 3, t.y + Math.sin(a) * 3,
          Math.cos(a) * (1.5 + Math.random()), Math.sin(a) * (0.5 + Math.random()),
          18 + Math.random() * 12, [P.mud, P.mudL, P.mudD][Math.random() * 3 | 0], 2);
      }
    }
    t.hitTime++;
    if (G.frame % 2 === 0) {
      spawnPart(t.x + (Math.random()-0.5)*4, t.y + (Math.random()-0.5)*4,
        (Math.random() - 0.5) * 2.5, -Math.random() * 2,
        14, [P.mud, P.mudL, P.mudD][Math.random() * 3 | 0], 1 + (Math.random()*2|0));
    }
  }

  // Stream spray particles
  if (G.frame % 2 === 0) {
    const d = 10 + Math.random() * range * 0.8;
    const a = G.aimAngle + (Math.random() - 0.5) * halfAng * 2;
    spawnPart(NOZ_X + Math.sin(a)*d, AZ_Y - Math.cos(a)*d,
      (Math.random()-0.5)*1.2, Math.random()*0.8,
      12+Math.random()*8, [P.mud,P.mudL,P.mudD][Math.random()*3|0], 1);
  }
}

function updateTourists() {
  for (let i = G.tourists.length - 1; i >= 0; i--) {
    const t = G.tourists[i];
    if (t.state === 'enter') {
      t.x += (DOOR_XS[t.enterDoor] + DOOR_W / 2 - t.x) * 0.3;
      t.y -= 2.5;
      if (t.y < BLD_BOT - 10) {
        G.tourists.splice(i, 1);
        const door = G.doors[t.enterDoor];
        door.slamTimer = 12; door.open = false;
        G.shakeTrauma += 0.25; G.hitstop = 3; G.flashAlpha = 0.3;
        G.healed++;
        for (let j = 0; j < 20; j++) {
          const a = Math.random() * Math.PI * 2;
          spawnPart(t.x, BLD_BOT, Math.cos(a)*(2+Math.random()*2), Math.sin(a)*(2+Math.random()),
            30+Math.random()*20, ['#ffd700','#fff','#ffa500','#44ff44','#ff44aa','#44aaff'][Math.random()*6|0], 2, 0);
        }
        const comboMul = Math.max(1, G.combo);
        const pts = t.pts * comboMul;
        G.score += pts;
        spawnPopup(t.x, BLD_BOT - 5, '+' + pts, G.combo > 1 ? '#ffd700' : '#fff', 1 + G.combo * 0.2);
        G.combo++; G.comboTimer = 120;
        if (G.combo > G.bestCombo) G.bestCombo = G.combo;
        if (G.combo >= 3) {
          spawnPopup(W / 2, H / 2 - 20, 'x' + G.combo + '!', '#ffd700', 1.5 + G.combo * 0.2);
          G.flashAlpha = 0.4;
          for (let j = 0; j < G.combo * 3; j++) {
            const a = Math.random() * Math.PI * 2;
            spawnPart(W/2, H/2-20, Math.cos(a)*3, Math.sin(a)*3, 20, '#ffd700', 1, 0);
          }
        }
        spawnPopup(t.x, BLD_BOT + 5, '+14 ДЗЁН', '#aaffaa', 0.7);
        G.faceExpr = 'grin'; G.faceTimer = 40;
        G.mudStains.push({ x: t.x - 3 + Math.random() * 6, y: BLD_BOT + 5, life: 600 });
      }
      continue;
    }
    if (t.state === 'escape') { G.tourists.splice(i, 1); continue; }

    if (t.type === 'selfie') {
      t.selfieTimer--;
      if (t.selfieTimer <= 0 && !t.selfieImmune && t.selfieCount < 3) {
        t.selfieImmune = true; t.selfieTimer = 50; t.selfieCount++;
      } else if (t.selfieImmune && t.selfieTimer <= 0) {
        t.selfieImmune = false; t.vy += 1.5; t.selfieTimer = 80 + Math.random() * 40;
      }
    }

    if (t.state !== 'enter') {
      t.vy += t.speed * 0.08;
      // Gentle drift toward target X (center zone) when walking
      if (t.state === 'walk') {
        const drift = (t.targetX - t.x) * 0.002;
        t.vx += Math.max(-0.08, Math.min(0.08, drift));
      }
    }
    t.vx *= 0.93; t.vy *= 0.93;
    t.x += t.vx; t.y += t.vy;
    t.x = Math.max(8, Math.min(W - 8, t.x));

    const spd = Math.sqrt(t.vx * t.vx + t.vy * t.vy);
    if (t.state === 'hit' && spd < 0.3) t.state = 'walk';
    if (spd > 2.5) t.state = 'tumble';
    else if (spd > 0.8 && t.vy < -0.3) t.state = 'slide';
    else if (t.state === 'tumble' || t.state === 'slide') {
      if (spd < 0.5) t.state = 'walk';
    }

    if (t.state === 'tumble') t.rot += 0.25;
    else if (t.state === 'slide' || t.state === 'hit') t.rot = Math.sin(G.frame * 0.3) * 0.15;
    else t.rot *= 0.8;

    if (t.flash > 0) t.flash--;

    if (t.vy < -0.3 && t.y < GND_Y + 15) {
      let best = -1, bestD = 30;
      for (let d = 0; d < 5; d++) {
        const ddx = Math.abs(t.x - (DOOR_XS[d] + DOOR_W / 2));
        if (ddx < bestD) { bestD = ddx; best = d; }
      }
      if (best >= 0) { t.state = 'enter'; t.enterDoor = best; G.doors[best].open = true; playSfx('enter'); continue; }
    }

    if (t.y < GND_Y + 3 && t.vy < 0) t.vy = Math.abs(t.vy) * 0.3;

    if (t.y > ESCAPE_Y) {
      t.state = 'escape';
      G.lives--;
      G.shakeTrauma += 0.5; G.flashAlpha = 0.4;
      playSfx('escape');
      G.combo = 0; G.comboTimer = 0;
      G.faceExpr = 'scream'; G.faceTimer = 60;
      spawnPopup(t.x, ESCAPE_Y - 10, 'УЦЁК!', '#ff4444', 1.2);
      for (let j = 0; j < 8; j++) {
        spawnPart(t.x, ESCAPE_Y, (Math.random()-0.5)*2, -Math.random()*2, 20, '#ff4444', 2, 0.05);
      }
      if (G.lives <= 0) {
        G.state = 'over'; G.overTime = Date.now();
        audioMusic.pause();
        stopVoice();
        stopAllSfx();
        audioGameover.currentTime = 0;
        audioGameover.play().catch(() => {});
      }
    }

    if ((t.state === 'slide' || t.state === 'tumble') && G.frame % 6 === 0)
      G.mudStains.push({ x: t.x, y: t.y + 8, life: 300 });
  }

  // Tourist-tourist collisions
  for (let i = 0; i < G.tourists.length; i++) {
    for (let j = i + 1; j < G.tourists.length; j++) {
      const a = G.tourists[i], b = G.tourists[j];
      if (a.state === 'enter' || b.state === 'enter') continue;
      if (a.state === 'escape' || b.state === 'escape') continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minD = 10;
      if (dist < minD && dist > 0.1) {
        const nx = dx / dist, ny = dy / dist;
        const overlap = minD - dist;
        a.x -= nx * overlap * 0.5; a.y -= ny * overlap * 0.5;
        b.x += nx * overlap * 0.5; b.y += ny * overlap * 0.5;
        const relV = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;
        if (relV > 0) {
          const slip = 1 - Math.max(a.muddy, b.muddy) * 0.85;
          const impulse = relV * 0.7 * slip;
          a.vx -= impulse * nx * (b.mass / a.mass) * 0.5;
          a.vy -= impulse * ny * (b.mass / a.mass) * 0.5;
          b.vx += impulse * nx * (a.mass / b.mass) * 0.5;
          b.vy += impulse * ny * (a.mass / b.mass) * 0.5;
          if (relV > 1.5) {
            G.hitstop = 2; G.shakeTrauma += 0.15;
            for (let k = 0; k < 4; k++) {
              spawnPart((a.x+b.x)/2,(a.y+b.y)/2,(Math.random()-0.5)*2,-Math.random()*1.5,
                15,['#ddd','#bbb','#999','#fff'][Math.random()*4|0],1+Math.random()*2|0,0.04);
            }
          }
        }
      }
    }
  }
}

// ============================================================
// I. PARTICLES & POPUPS
// ============================================================
const MAX_PARTS = 200;
function spawnPart(x, y, vx, vy, life, color, size, gy) {
  if (G.particles.length >= MAX_PARTS) G.particles.shift();
  G.particles.push({ x, y, vx, vy, life, maxLife: life, color, size, gy: gy !== undefined ? gy : 0.05 });
}
function updateParts() {
  for (let i = G.particles.length - 1; i >= 0; i--) {
    const p = G.particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += p.gy; p.life--;
    if (p.life <= 0) G.particles.splice(i, 1);
  }
}
function spawnPopup(x, y, text, color, scale) {
  G.popups.push({ x, y, text, color, scale: scale || 1, vy: -0.8, life: 50, maxLife: 50 });
}
function updatePopups() {
  for (let i = G.popups.length - 1; i >= 0; i--) {
    const p = G.popups[i];
    p.y += p.vy; p.vy *= 0.96; p.life--;
    if (p.life <= 0) G.popups.splice(i, 1);
  }
}

// ============================================================
// J. MAIN UPDATE
// ============================================================
function update() {
  if (G.state !== 'play') return;
  if (G.hitstop > 0) { G.hitstop--; return; }

  G.frame++; G.time = G.frame;

  if (G.comboTimer > 0) G.comboTimer--;
  else G.combo = 0;

  if (G.faceTimer > 0) G.faceTimer--;
  else G.faceExpr = 'normal';

  if (G.waveTextTimer > 0) G.waveTextTimer--;

  // Voice lines
  if (voiceTimer > 0) voiceTimer--;
  else playVoice();

  // Flash decay
  G.flashAlpha = Math.max(0, G.flashAlpha - 0.05);

  // Shake decay
  G.shakeTrauma = Math.max(0, G.shakeTrauma - 0.02);
  G.shakeTrauma = Math.min(G.shakeTrauma, 1.0);
  const shake = G.shakeTrauma * G.shakeTrauma;
  G.shakeX = (Math.random() - 0.5) * shake * 8;
  G.shakeY = (Math.random() - 0.5) * shake * 8;

  if (G.turboActive) {
    G.turboTimer--;
    if (G.turboTimer <= 0) G.turboActive = false;
  }

  let dangerClose = false;
  for (const t of G.tourists) {
    if (t.y > ESCAPE_Y - 30 && t.state !== 'enter' && t.state !== 'escape') dangerClose = true;
  }
  if (dangerClose && G.faceExpr === 'normal') G.faceExpr = 'scream';

  G.spawnTimer--;
  if (G.spawnTimer <= 0) {
    spawnTourist(pickType());
    const sec = G.time / 60;
    G.spawnInterval = Math.max(35, 90 - sec * 0.5);
    G.spawnTimer = G.spawnInterval;
  }

  G.busTimer--;
  if (G.busTimer <= 0) { spawnBus(); G.busTimer = 60 * (45 + Math.random() * 15); }

  if (!G.turboActive && G.turboCooldown <= 0 && G.time > 60 * 10 && Math.random() < 0.002) {
    G.turboPickup = { x: 20 + Math.random() * (W - 40), y: 5, vy: 0.3 };
    G.turboCooldown = 60 * 20;
  }
  if (G.turboCooldown > 0) G.turboCooldown--;

  if (G.turboPickup) {
    G.turboPickup.y += G.turboPickup.vy;
    if (G.turboPickup.y > ESCAPE_Y) G.turboPickup = null;
    else if (G.streamActive) {
      const dx = G.turboPickup.x - NOZ_X, dy = AZ_Y - G.turboPickup.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      const pct = G.pressure / G.maxPressure;
      const range = 140 * pct;
      const ang = Math.atan2(dx, dy);
      let diff = ang - G.aimAngle;
      while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
      if (Math.abs(diff) < 0.2 && dist < range) {
        G.turboActive = true; G.turboTimer = 300;
        G.shakeTrauma += 0.35; G.flashAlpha = 0.4;
        playSfx('turbo');
        G.waveText = 'ТУРБА-ГРАЗЬ!'; G.waveTextTimer = 60;
        G.faceExpr = 'grin'; G.faceTimer = 60;
        for (let j = 0; j < 15; j++) {
          const a = Math.random() * Math.PI * 2;
          spawnPart(G.turboPickup.x, G.turboPickup.y, Math.cos(a)*2, Math.sin(a)*2,
            20, ['#ffd700','#ff8800','#fff'][Math.random()*3|0], 2, 0);
        }
        G.turboPickup = null;
      }
    }
  }

  for (let i = G.mudStains.length - 1; i >= 0; i--) {
    G.mudStains[i].life--;
    if (G.mudStains[i].life <= 0) G.mudStains.splice(i, 1);
  }

  for (const d of G.doors) {
    if (d.timer > 0) d.timer--; else d.open = false;
    if (d.slamTimer > 0) d.slamTimer--;
  }

  updateStream();
  updateTourists();
  updateParts();
  updatePopups();
}

// ============================================================
// K. RENDERING
// ============================================================
function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();

  if (G.state === 'play') ctx.translate(G.shakeX, G.shakeY);

  ctx.drawImage(bgCanvas, 0, 0);

  // Doors
  for (let i = 0; i < 5; i++) {
    const d = G.doors[i]; const dx = DOOR_XS[i];
    if (d.open) {
      rect(ctx, dx, DOOR_Y, DOOR_W, DOOR_H, P.doorO);
      rect(ctx, dx, DOOR_Y, 1, DOOR_H, P.doorD);
      rect(ctx, dx + DOOR_W - 2, DOOR_Y, 2, DOOR_H, P.door);
    } else {
      rect(ctx, dx, DOOR_Y, DOOR_W, DOOR_H, P.door);
      rect(ctx, dx, DOOR_Y, 1, DOOR_H, P.doorL);
      rect(ctx, dx + DOOR_W - 1, DOOR_Y, 1, DOOR_H, P.doorD);
      rect(ctx, dx + DOOR_W / 2 | 0, DOOR_Y, 1, DOOR_H, P.doorD);
      px(ctx, dx + DOOR_W - 3, DOOR_Y + DOOR_H / 2 | 0, '#aa9944');
    }
    if (d.slamTimer > 8) {
      ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.6;
      ctx.fillRect(dx - 3, DOOR_Y - 3, DOOR_W + 6, DOOR_H + 6);
      ctx.globalAlpha = 1;
    }
  }

  // Mud stains
  for (const s of G.mudStains) {
    ctx.globalAlpha = Math.min(1, s.life / 60) * 0.4;
    ctx.drawImage(mudStainSpr, s.x - 3 | 0, s.y - 1 | 0);
  }
  ctx.globalAlpha = 1;

  // Tourists (y-sorted)
  const sorted = [...G.tourists].sort((a, b) => a.y - b.y);
  for (const t of sorted) {
    const walkFrame = t.state === 'walk' ? (Math.floor(G.frame / 10) % 2 + 1) : 0;
    const sprKey = t.sprite + '_' + walkFrame;
    const spr = SPR[sprKey];
    const sprW = SPR_W[sprKey];
    const dw = t.sw / 2, dh = 24;
    ctx.save();
    ctx.translate(Math.round(t.x), Math.round(t.y));
    if (t.rot) ctx.rotate(t.rot);

    const bob = t.state === 'walk' ? Math.round(Math.sin(G.frame * 0.12) * 1.2) : 0;

    if (t.flash > 0) {
      ctx.drawImage(sprW, -dw / 2, -dh / 2 + bob, dw, dh);
    } else {
      ctx.drawImage(spr, -dw / 2, -dh / 2 + bob, dw, dh);
      if (t.muddy > 0) {
        ctx.globalAlpha = t.muddy * 0.4;
        ctx.fillStyle = P.mud;
        ctx.fillRect(-dw / 2 + 1, -dh / 2 + bob + 1, dw - 2, dh - 2);
        ctx.globalAlpha = 1;
      }
    }

    if (t.selfieImmune) {
      ctx.fillStyle = '#ff44aa';
      ctx.fillRect(-1, -dh / 2 - 4, 2, 2);
      ctx.fillStyle = '#ff88cc';
      ctx.fillRect(1, -dh / 2 - 6, 2, 2);
    }

    if (t.y > ESCAPE_Y - 35 && t.state !== 'enter') {
      if (Math.sin(G.frame * 0.3) > 0) {
        ctx.fillStyle = '#ff0000';
        ctx.font = '8px '+F; ctx.textAlign = 'center';
        ctx.fillText('!', 0, -dh / 2 - 3);
      }
    }

    ctx.restore();
  }

  // Mud stream (multi-layer, prettier)
  if (G.streamActive && G.pressure > 0) {
    const pct = G.pressure / G.maxPressure;
    const range = 140 * pct * (G.turboActive ? 2.0 : 1);
    const steps = 30;
    const turbo = G.turboActive;
    // Core stream + side layers
    for (let layer = -1; layer <= 1; layer++) {
      const layerOff = layer * 0.04;
      const layerAlpha = layer === 0 ? 1 : 0.5;
      ctx.globalAlpha = layerAlpha;
      for (let i = 0; i < steps; i++) {
        const t = i / steps;
        const dist = t * range;
        const wobble = Math.sin(G.frame * 0.5 + i * 0.35 + layer) * t * 0.1;
        const ang = G.aimAngle + layerOff + wobble;
        const sx = NOZ_X + Math.sin(ang) * dist;
        const sy = AZ_Y - Math.cos(ang) * dist;
        const w = (1.5 + t * (turbo ? 9 : 5)) * pct;
        const cols = [P.mud, P.mudL, P.mudD, '#7a5a2a'];
        ctx.fillStyle = cols[(i + layer + 4) % 4];
        ctx.fillRect(sx - w / 2 | 0, sy | 0, Math.ceil(w), 2);
        // Droplets along stream
        if (layer === 0 && i % 3 === 0) {
          const perpX = Math.cos(ang), perpY = Math.sin(ang);
          const off = (Math.random() - 0.5) * w * 3;
          ctx.fillStyle = P.mudL;
          ctx.fillRect(sx + perpX * off | 0, sy + perpY * off | 0, 1, 1);
        }
        // Splatter at end
        if (layer === 0 && t > 0.82) {
          const splat = (t - 0.82) / 0.18;
          for (let s = 0; s < 2; s++) {
            ctx.fillStyle = [P.mud, P.mudL, P.mudD][s % 3];
            ctx.fillRect(sx + (Math.random()-0.5)*splat*8|0, sy+(Math.random()-0.5)*splat*5|0,
              1+Math.random()*2|0, 1);
          }
        }
      }
    }
    ctx.globalAlpha = 1;
    if (turbo && G.frame % 4 < 2) {
      ctx.fillStyle = '#ffaa00'; ctx.globalAlpha = 0.5;
      ctx.fillRect(NOZ_X - 3, NOZ_Y - 3, 7, 7);
      ctx.globalAlpha = 1;
    }
  }

  // Turbo pickup
  if (G.turboPickup) {
    const tp = G.turboPickup;
    const glow = Math.sin(G.frame * 0.2) * 0.3 + 0.7;
    // Outer outline ring
    ctx.globalAlpha = glow;
    ctx.fillStyle = '#000'; ctx.fillRect(tp.x - 6, tp.y - 6, 12, 12);
    ctx.fillStyle = '#fff'; ctx.fillRect(tp.x - 5, tp.y - 5, 10, 10);
    ctx.fillStyle = '#ffd700'; ctx.fillRect(tp.x - 4, tp.y - 4, 8, 8);
    ctx.fillStyle = '#ffaa00'; ctx.fillRect(tp.x - 3, tp.y - 3, 6, 6);
    ctx.fillStyle = '#fff'; ctx.fillRect(tp.x - 1, tp.y - 1, 2, 2);
    ctx.globalAlpha = 1;
    // Label with dark outline
    ctx.font = '8px '+F; ctx.textAlign = 'center';
    ctx.fillStyle = '#000';
    ctx.fillText('ТУРБА', tp.x - 1, tp.y - 7);
    ctx.fillText('ТУРБА', tp.x + 1, tp.y - 7);
    ctx.fillText('ТУРБА', tp.x, tp.y - 6);
    ctx.fillText('ТУРБА', tp.x, tp.y - 8);
    ctx.fillStyle = '#ffd700';
    ctx.fillText('ТУРБА', tp.x, tp.y - 7);
  }

  // Particles
  for (const p of G.particles) {
    ctx.globalAlpha = p.life < 8 ? p.life / 8 : 1;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x | 0, p.y | 0, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Azarenok
  ctx.drawImage(SPR.az, AZ_X - 10, AZ_Y - 12, 20, 24);

  ctx.restore(); // end shake

  // Flash overlay (after shake restore, covers everything)
  if (G.flashAlpha > 0) {
    ctx.globalAlpha = G.flashAlpha;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, HUD_Y);
    ctx.globalAlpha = 1;
  }

  // Popups (no shake)
  for (const p of G.popups) {
    ctx.globalAlpha = p.life < 15 ? p.life / 15 : 1;
    const sz = p.scale >= 1.5 ? 16 : 8;
    ctx.fillStyle = '#000'; ctx.font = `${sz}px ${F}`; ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x + 1, p.y + 1);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;

  renderHUD();

  // Wave text
  if (G.waveTextTimer > 0) {
    ctx.globalAlpha = G.waveTextTimer < 15 ? G.waveTextTimer / 15 : 1;
    ctx.font = '8px '+F;
    ctx.fillStyle = '#000';
    pxT(ctx, G.waveText, W / 2 + 1, H / 2 - 29, 8);
    ctx.fillStyle = '#ffdd00';
    pxT(ctx, G.waveText, W / 2, H / 2 - 30, 8);
    ctx.globalAlpha = 1;
  }

  // Pressure hint — always visible when < 50%
  if (G.state === 'play' && G.pressure < G.maxPressure * 0.5) {
    const urgency = 1 - G.pressure / (G.maxPressure * 0.5); // 0→1 as pressure drops
    const pulse = Math.sin(Date.now() * 0.012) * 0.5 + 0.5;
    const alpha = (0.5 + urgency * 0.5) * (0.7 + pulse * 0.3);
    ctx.globalAlpha = alpha;
    // Dark backdrop
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, H / 2 - 50, W, 55);
    // Line 1: АДПУСЦІ ЭКРАН!
    ctx.font = '8px ' + F;
    ctx.fillStyle = '#000';
    pxT(ctx, 'АДПУСЦІ ЭКРАН!', W / 2 + 1, H / 2 - 27, 8);
    ctx.fillStyle = '#ff4444';
    pxT(ctx, 'АДПУСЦІ ЭКРАН!', W / 2, H / 2 - 28, 8);
    // Line 2: ГРАЗЬ НАБІРАЕЦЦА!
    ctx.font = '8px ' + F;
    ctx.fillStyle = '#000';
    pxT(ctx, 'ГРАЗЬ НАБІРАЕЦЦА!', W / 2 + 1, H / 2 - 11, 8);
    ctx.fillStyle = '#ffdd00';
    pxT(ctx, 'ГРАЗЬ НАБІРАЕЦЦА!', W / 2, H / 2 - 12, 8);
    ctx.globalAlpha = 1;
  }

  // Danger border
  if (G.state === 'play') {
    let danger = 0;
    for (const t of G.tourists) {
      if (t.y > ESCAPE_Y - 40 && t.state !== 'enter') danger += 0.15;
    }
    if (danger > 0) {
      ctx.globalAlpha = Math.min(0.4, danger) * (0.5 + Math.sin(G.frame * 0.15) * 0.5);
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(0, 0, W, 3); ctx.fillRect(0, 0, 3, HUD_Y);
      ctx.fillRect(W - 3, 0, 3, HUD_Y); ctx.fillRect(0, HUD_Y - 3, W, 3);
      ctx.globalAlpha = 1;
    }
  }
}

function renderHUD() {
  for (let i = 0; i < G.maxLives; i++) {
    const lx = 4 + i * 10;
    if (i < G.lives) {
      ctx.fillStyle = '#44cc44'; ctx.fillRect(lx, HUD_Y + 4, 8, 8);
      ctx.fillStyle = '#228822'; ctx.fillRect(lx + 1, HUD_Y + 5, 6, 6);
      ctx.fillStyle = '#66ee66';
      ctx.font = '8px '+F; ctx.textAlign = 'center';
      ctx.fillText('\u2665', lx + 4, HUD_Y + 11);
    } else {
      ctx.fillStyle = '#442222'; ctx.fillRect(lx, HUD_Y + 4, 8, 8);
      ctx.fillStyle = '#331111'; ctx.fillRect(lx + 1, HUD_Y + 5, 6, 6);
    }
  }
  ctx.fillStyle = '#fff'; ctx.font = '8px '+F; ctx.textAlign = 'left';
  ctx.fillText(String(G.score), 4, HUD_Y + 22);
  if (G.combo > 1) {
    ctx.fillStyle = '#ffd700'; ctx.font = '8px '+F;
    ctx.fillText('x' + G.combo, 4, HUD_Y + 32);
  }
  const fS = 26, fX = W / 2 - fS / 2 | 0;
  ctx.fillStyle = '#444'; ctx.fillRect(fX - 1, HUD_Y + 4, fS + 2, fS + 2);
  ctx.drawImage(FACE[G.faceExpr], fX, HUD_Y + 5, fS, fS);
  const gX = W / 2 + 18, gW = 48;
  const pRatio = G.pressure / G.maxPressure;
  // Bar border — glows when low
  if (pRatio < 0.75) {
    const flash = Math.sin(G.frame * 0.25) * 0.5 + 0.5;
    ctx.fillStyle = pRatio < 0.3 ? (G.frame % 6 < 3 ? '#ff2222' : '#ff8800') : '#cc6600';
    ctx.globalAlpha = 0.5 + flash * 0.5;
    rect(ctx, gX - 1, HUD_Y + 9, gW + 2, 7, ctx.fillStyle);
    ctx.globalAlpha = 1;
  }
  // Label — bright when low
  const labelCol = pRatio < 0.5 ? (G.frame % 10 < 5 ? '#ff4444' : '#ffaa00') : '#aaa';
  ctx.fillStyle = labelCol; ctx.font = '8px '+F; ctx.textAlign = 'left';
  ctx.fillText('ГРАЗЬ', gX, HUD_Y + 8);
  // Bar background
  rect(ctx, gX, HUD_Y + 10, gW, 5, '#0a0a1a');
  // Bar fill — bright colors
  const fill = gW * pRatio;
  let mudCol;
  if (G.turboActive) mudCol = '#ffaa00';
  else if (pRatio > 0.75) mudCol = '#44bb44';
  else if (pRatio > 0.5) mudCol = '#ddaa22';
  else if (pRatio > 0.25) mudCol = G.frame % 8 < 4 ? '#ff8800' : '#ffcc00';
  else mudCol = G.frame % 6 < 3 ? '#ff2222' : '#ff6600';
  rect(ctx, gX + 1, HUD_Y + 11, Math.max(0, fill - 1), 3, mudCol);
  ctx.fillStyle = '#aaa'; ctx.font = '8px '+F; ctx.textAlign = 'right';
  ctx.fillText('АЗДАР:' + G.healed, W - 4, HUD_Y + 38);
}

// ============================================================
// L. TITLE & GAME OVER SCREENS
// ============================================================
function drawSceneBg() {
  ctx.drawImage(bgCanvas, 0, 0);
  for (let i = 0; i < 5; i++) {
    const dx = DOOR_XS[i];
    rect(ctx, dx, DOOR_Y, DOOR_W, DOOR_H, P.door);
    rect(ctx, dx, DOOR_Y, 1, DOOR_H, P.doorL);
    rect(ctx, dx + DOOR_W - 1, DOOR_Y, 1, DOOR_H, P.doorD);
  }
  ctx.drawImage(SPR.az, AZ_X - 10, AZ_Y - 12, 20, 24);
}

function drawMuteIcon() {
  const x = MUTE_X, y = MUTE_Y;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(x, y, MUTE_S, MUTE_S);
  ctx.fillStyle = '#fff';
  // Speaker body
  ctx.fillRect(x + 2, y + 5, 3, 4);
  ctx.fillRect(x + 5, y + 3, 2, 8);
  if (muted) {
    // X mark
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(x + 9, y + 4, 1, 1); ctx.fillRect(x + 12, y + 4, 1, 1);
    ctx.fillRect(x + 10, y + 5, 1, 1); ctx.fillRect(x + 11, y + 5, 1, 1);
    ctx.fillRect(x + 10, y + 7, 1, 1); ctx.fillRect(x + 11, y + 7, 1, 1);
    ctx.fillRect(x + 9, y + 8, 1, 1); ctx.fillRect(x + 12, y + 8, 1, 1);
  } else {
    // Sound waves
    ctx.fillRect(x + 9, y + 5, 1, 4);
    ctx.fillRect(x + 11, y + 3, 1, 8);
  }
}

function renderTitle() {
  ctx.clearRect(0, 0, W, H);

  if (G.introScreen === 0) {
    // Screen 0: Title + absurd tagline
    drawSceneBg();
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, GND_Y + 5, W, 175);

    ctx.fillStyle = '#e94560'; ctx.font = '16px '+F;
    pxT(ctx, 'ЖУРАВУШКА', W / 2, GND_Y + 32, 16);

    ctx.fillStyle = '#ffd700'; ctx.font = '8px '+F;
    pxT(ctx, 'ЛЯЧЭБНАЯ ГРАЗЬ', W / 2, GND_Y + 54, 8);

    ctx.fillStyle = '#aaa'; ctx.font = '8px '+F;
    pxT(ctx, 'МIНЗДРАЎ РБ', W / 2, GND_Y + 74, 8);
    pxT(ctx, 'ПАПЯРЭДЖВАЕ:', W / 2, GND_Y + 86, 8);
    ctx.fillStyle = '#ff8844'; ctx.font = '8px '+F;
    pxT(ctx, 'ГРАЗЬ ЛЕЧЫЦЬ', W / 2, GND_Y + 104, 8);
    pxT(ctx, 'УСЁ!', W / 2, GND_Y + 116, 8);

    if (Math.sin(Date.now() / 400) > 0) {
      ctx.fillStyle = '#fff'; ctx.font = '8px '+F;
      pxT(ctx, 'ДАКРАНІСЯ', W / 2, GND_Y + 140, 8);
    }

    ctx.fillStyle = '#ffd700'; ctx.font = '8px '+F;
    pxT(ctx, 'ГУЛЬНЯ АД', W / 2, GND_Y + 160, 8);
    ctx.fillStyle = '#fff';
    pxT(ctx, 'ZERKALO.IO', W / 2, GND_Y + 172, 8);
  }
  else if (G.introScreen === 1) {
    // Screen 1: Story
    ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#e94560'; ctx.font = '16px '+F;
    pxT(ctx, 'ГІСТОРЫЯ', W / 2, 30, 16);

    ctx.fillStyle = '#ddd'; ctx.font = '8px '+F;
    const lines = [
      '2026 год.',
      'Санаторый ЖУРАВУШКА',
      'ў бядзе!',
      '',
      'Турысты ўцякаюць',
      'ад лячэбнай гразі',
      'за мяжу!',
      '',
      'Адзін чалавек',
      'спыніць іх...',
    ];
    for (let i = 0; i < lines.length; i++) {
      if (lines[i]) pxT(ctx, lines[i], W / 2, 52 + i * 14, 8);
    }

    // Draw Azarenok big
    ctx.drawImage(SPR.az, W / 2 - 16, 185, 32, 38);

    ctx.fillStyle = '#ffd700'; ctx.font = '8px '+F;
    pxT(ctx, 'АЗАРОНАК', W / 2, 236, 8);
    ctx.fillStyle = '#aaa'; ctx.font = '8px '+F;
    pxT(ctx, 'ГРАЗЕТЭРАПЕЎТ', W / 2, 252, 8);

    if (Math.sin(Date.now() / 400) > 0) {
      ctx.fillStyle = '#fff'; ctx.font = '8px '+F;
      pxT(ctx, '>>> ДАЛЕЙ <<<', W / 2, 280, 8);
    }

    ctx.fillStyle = '#ffd700'; ctx.font = '8px '+F;
    pxT(ctx, 'ГУЛЬНЯ АД', W / 2, 300, 8);
    ctx.fillStyle = '#fff';
    pxT(ctx, 'ZERKALO.IO', W / 2, 312, 8);
  }
  else {
    // Screen 2: Instructions
    ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#e94560'; ctx.font = '16px '+F;
    pxT(ctx, 'ЯК ГУЛЯЦЬ', W / 2, 24, 16);

    ctx.fillStyle = '#ddd'; ctx.font = '8px '+F;
    pxT(ctx, 'ДАКРАНІСЯ КАБ', W / 2, 46, 8);
    pxT(ctx, 'СТРАЛЯЦЬ ГРАЗЗЮ', W / 2, 60, 8);

    // Draw tourist -> stream -> door
    ctx.drawImage(SPR.t1_0, 25, 68, 16, 24);
    ctx.fillStyle = P.mud;
    for (let i = 0; i < 8; i++) ctx.fillRect(48 + i * 4, 78, 3, 2);
    ctx.fillStyle = '#ffd700'; ctx.font = '8px '+F;
    ctx.textAlign = 'left'; ctx.fillText('\u2190', 88, 84);
    rect(ctx, 96, 70, 10, 18, P.door);

    ctx.fillStyle = '#aaffaa'; ctx.font = '8px '+F;
    pxT(ctx, 'ЗАГАНІ ТУРЫСТАЎ', W / 2, 108, 8);
    pxT(ctx, 'У САНАТОРЫЙ!', W / 2, 122, 8);

    ctx.fillStyle = '#ff8844'; ctx.font = '8px '+F;
    pxT(ctx, 'УЦЯКЛІ 5 -', W / 2, 142, 8);
    pxT(ctx, 'ПРАЙГРАЎ!', W / 2, 156, 8);

    // Tourist types
    ctx.fillStyle = '#ffd700'; ctx.font = '8px '+F;
    pxT(ctx, 'ТУРЫСТЫ:', W / 2, 172, 8);

    const types = [
      ['t1_0', 16, 'ЛЁГКІ'],
      ['t2_0', 18, 'ХУТКІ'],
      ['t3_0', 16, 'ЦЯЖКІ'],
      ['t4_0', 16, 'ЗВЫЧАЙНЫ'],
    ];
    for (let i = 0; i < types.length; i++) {
      const [key, , label] = types[i];
      ctx.drawImage(SPR[key], 20, 180 + i * 24, 14, 21);
      ctx.fillStyle = '#ccc'; ctx.font = '8px '+F;
      ctx.textAlign = 'left'; ctx.fillText(label, 40, 194 + i * 24);
    }

    if (Math.sin(Date.now() / 400) > 0) {
      ctx.fillStyle = '#fff'; ctx.font = '16px '+F;
      pxT(ctx, 'ГУЛЯЦЬ!', W / 2, 292, 16);
    }
  }
}

function renderGameOver() {
  render();

  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#e94560'; ctx.font = '16px '+F;
  pxT(ctx, 'САНАТОРЫЙ', W / 2, 95, 16);
  pxT(ctx, 'АПУСЦЕЎ!', W / 2, 118, 16);

  ctx.fillStyle = '#fff'; ctx.font = '8px '+F;
  pxT(ctx, 'АЧКІ: ' + G.score, W / 2, 145, 8);

  ctx.fillStyle = '#aaffaa'; ctx.font = '8px '+F;
  pxT(ctx, 'АЗДАРОЎЛЕНА: ' + G.healed, W / 2, 168, 8);

  if (G.bestCombo > 1) {
    ctx.fillStyle = '#ffd700';
    pxT(ctx, 'МАКС КОМБА: x' + G.bestCombo, W / 2, 186, 8);
  }

  if (Math.sin(Date.now() / 400) > 0) {
    ctx.fillStyle = '#fff'; ctx.font = '8px '+F;
    pxT(ctx, 'ПАЎТАРЫЦЬ', W / 2, 220, 8);
  }

  // Donate CTA with motion effect
  const dt = Date.now();
  const pulse = Math.sin(dt / 300) * 0.3 + 0.7;
  const bounce = Math.sin(dt / 500) * 2;

  ctx.fillStyle = '#ffd700'; ctx.font = '8px '+F;
  pxT(ctx, 'ХОЧАШ БОЛЬШ', W / 2, 250, 8);
  pxT(ctx, 'ТАКІХ ГУЛЬНЯЎ?', W / 2, 262, 8);

  // Pulsing glow for link
  const glow = Math.sin(dt / 200) * 0.5 + 0.5;
  const r = 68 + glow * 80 | 0, g = 220 + glow * 35 | 0, b = 255;
  ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
  ctx.globalAlpha = pulse;
  pxT(ctx, 'ПАДТРЫМАЙ', W / 2, 280 + (bounce | 0), 8);
  pxT(ctx, '"ЛЮСТЭРКА"!', W / 2, 292 + (bounce | 0), 8);
  // Underline
  const ulX = Math.round(W / 2 - 9 * 8 / 2);
  ctx.fillRect(ulX, 282 + (bounce | 0), 72, 1);
  const ulX2 = Math.round(W / 2 - 11 * 8 / 2);
  ctx.fillRect(ulX2, 294 + (bounce | 0), 88, 1);
  ctx.globalAlpha = 1;
}

// ============================================================
// M. MAIN LOOP
// ============================================================
let lastTime = 0;
const FIXED_DT = 1000 / 60;
let accumulator = 0;

function renderLoading() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // Zerkalo logo (512x101 → 160x32 on 180px canvas)
  if (logoImg.complete && logoImg.naturalWidth) {
    const lw = 160, lh = Math.round(lw * logoImg.naturalHeight / logoImg.naturalWidth);
    ctx.drawImage(logoImg, (W - lw) / 2, 60, lw, lh);
  }

  if (fontLoaded) {
    ctx.fillStyle = '#e94560'; ctx.font = '16px '+F;
    pxT(ctx, 'ЖУРАВУШКА', W / 2, 140, 16);
    ctx.fillStyle = '#ffd700'; ctx.font = '8px '+F;
    pxT(ctx, 'ЛЯЧЭБНАЯ ГРАЗЬ', W / 2, 168, 8);

    if (Math.sin(Date.now() / 400) > 0) {
      ctx.fillStyle = '#fff'; ctx.font = '8px '+F;
      pxT(ctx, 'ДАКРАНІСЯ', W / 2, 220, 8);
    }
    ctx.fillStyle = '#555'; ctx.font = '8px '+F;
    pxT(ctx, 'v0.03', W / 2, H - 12, 8);
  } else {
    ctx.fillStyle = '#e94560'; ctx.font = '16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('ЖУРАВУШКА', W / 2, 140);
    ctx.fillStyle = '#ffd700'; ctx.font = '12px monospace';
    ctx.fillText('ЗАГРУЗКА...', W / 2, 170);
  }
}

function loop(ts) {
  const dt = Math.min(ts - lastTime, 100);
  lastTime = ts;

  if (G.state === 'loading') {
    renderLoading();
  } else if (G.state === 'play') {
    accumulator += dt;
    while (accumulator >= FIXED_DT) {
      if (G.slowmo > 0) {
        G.slowmo--;
        if (G.slowmo % 3 !== 0) { accumulator -= FIXED_DT; continue; }
      }
      for (let i = G.busQueue.length - 1; i >= 0; i--) {
        if (G.frame >= G.busQueue[i].frame) {
          spawnTourist(pickType(), G.busQueue[i].door);
          G.busQueue.splice(i, 1);
        }
      }
      update();
      accumulator -= FIXED_DT;
    }
    render();
  } else if (G.state === 'title') {
    renderTitle();
  } else if (G.state === 'over') {
    renderGameOver();
  }
  // Mute icon on all screens
  drawMuteIcon();

  // Blit offscreen buffer to display canvas (nearest-neighbor upscale to physical pixels)
  dCtx.drawImage(buf, 0, 0, display.width, display.height);

  requestAnimationFrame(loop);
}

// Start loading all assets and run game loop
resize();
initLoading();
requestAnimationFrame(loop);

</script>
